# @package env
name: follower
kwargs:
  adversary_speed: 0.3   # probability per step that the adversary takes one step
  plan_delay: 3          # timesteps between requesting and receiving a plan
  min_spawn_dist: 5      # minimum Manhattan distance from the agent at spawn
  door_shift_prob: 0.1   # per-door probability of moving to a random position on that wall
  frame_stack: 1         # number of frames to stack (1 = disabled)
  path_dir_colors: true  # encode direction in path cells (obs channel + render colors)
